<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>NC//DATABANK — энциклопедия Cyberpunk 2077</title>
  <meta name="description" content="Неофициальная энциклопедия по вселенной Cyberpunk 2077: персонажи, локации, корпорации, банды и технологии Найт-Сити.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Tektur:wght@500;600;700;800&family=Manrope:wght@400;500;600;700&family=JetBrains+Mono:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

  <div class="scanlines" aria-hidden="true"></div>
  <div class="scanbar" aria-hidden="true"></div>
  <div class="glitch-flash" id="glitch-flash" aria-hidden="true"></div>

  <header class="topbar">
    <a class="logo" href="#/">
      <span class="logo-mark">NC//</span><span class="logo-text">DATABANK</span>
    </a>

    <div class="search" id="search">
      <span class="search-icon" aria-hidden="true">⌕</span>
      <input
        type="search"
        id="search-input"
        placeholder="Поиск по базе данных…"
        autocomplete="off"
        aria-label="Поиск по статьям">
      <kbd class="search-kbd">/</kbd>
      <div class="search-results" id="search-results" hidden></div>
    </div>

    <div class="topbar-meta" aria-hidden="true">
      <span class="meta-line">NET://WATSON.SEC-7</span>
      <span class="meta-line meta-ok" id="status-line">СОЕДИНЕНИЕ СТАБИЛЬНО</span>
    </div>
  </header>

  <div class="read-progress" aria-hidden="true"></div>

  <div class="layout">
    <aside class="sidebar" id="sidebar">
      <button class="sidebar-toggle" id="sidebar-toggle" aria-label="Открыть навигацию">
        НАВИГАЦИЯ <span class="toggle-arrow">▾</span>
      </button>
      <nav class="sidebar-nav" id="sidebar-nav" aria-label="Разделы энциклопедии">
        <button class="random-btn" id="random-btn" type="button">// Случайная запись</button>
        <p class="sidebar-label">// Разделы</p>
        <ul class="nav-categories" id="nav-categories"></ul>
        <p class="sidebar-label">// Статьи</p>
        <ul class="nav-articles" id="nav-articles"></ul>
      </nav>
    </aside>

    <main class="content" id="content" tabindex="-1"></main>
  </div>

  <footer class="footer">
    <p>NC//DATABANK — фанатская энциклопедия. Cyberpunk 2077 принадлежит CD PROJEKT RED.</p>
    <p class="footer-mono">db.rev 2077.07 · записей: <span id="footer-count">0</span></p>
  </footer>

  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
